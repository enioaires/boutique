services:
  database:
    image: postgis/postgis:15-3.3
    container_name: imobiliaria_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11.15.4
    container_name: imobiliaria_cms
    ports:
      - "8055:8055"
    depends_on:
      database:
        condition: service_healthy
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: ${DB_CLIENT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
      FLOWS_EXEC_ALLOWED_MODULES: ""
      # Cloudflare R2 (desabilitado temporariamente - SSL handshake issue)
      # STORAGE_LOCATIONS: "r2"
      # STORAGE_R2_DRIVER: "s3"
      # STORAGE_R2_KEY: "${STORAGE_R2_KEY}"
      # STORAGE_R2_SECRET: "${STORAGE_R2_SECRET}"
      # STORAGE_R2_BUCKET: "${STORAGE_R2_BUCKET}"
      # STORAGE_R2_ENDPOINT: "https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
      # STORAGE_R2_REGION: "auto"
      # STORAGE_R2_FORCE_PATH_STYLE: "true"
    volumes:
      - ./data/uploads:/directus/uploads
      - ./data/extensions:/directus/extensions
